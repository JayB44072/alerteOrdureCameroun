{% load static %}
<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Inscription — CleanCity</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css" rel="stylesheet">
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="{% static 'css/main.css' %}">
</head>
<body>
<div class="auth-wrapper">
    <div class="auth-card" style="max-width:560px;">

        <div class="auth-logo">
            <i class="fas fa-recycle text-success me-2"></i>
            Clean<span style="color:#f7c948">City</span>
        </div>
        <p class="auth-subtitle">Créez votre compte et rejoignez la communauté</p>

        {% if messages %}
            {% for message in messages %}
            <div class="alert alert-danger py-2 text-center" style="font-size:0.88rem;">
                {{ message }}
            </div>
            {% endfor %}
        {% endif %}

        <form method="POST">
            {% csrf_token %}

            <!-- Sélection du rôle -->
            <label class="form-label">
                <i class="fas fa-users me-1 text-success"></i>Je suis
            </label>
            <div class="role-selector mb-3">
                <div class="role-option active" id="role-citoyen"
                     onclick="selectRole('citoyen')">
                    <i class="fas fa-user"></i>
                    <span>Citoyen</span>
                </div>
                <div class="role-option" id="role-agent"
                     onclick="selectRole('agent')">
                    <i class="fas fa-truck"></i>
                    <span>Agent HYSACAM</span>
                </div>
            </div>
            <input type="hidden" name="role" id="roleInput" value="citoyen">

            <div class="row g-3">
                <div class="col-12">
                    <label class="form-label">
                        <i class="fas fa-user me-1 text-success"></i>Nom d'utilisateur
                    </label>
                    <input type="text" name="username" class="form-control"
                           placeholder="Choisissez un nom d'utilisateur" required>
                </div>
                <div class="col-12">
                    <label class="form-label">
                        <i class="fas fa-envelope me-1 text-success"></i>Email
                    </label>
                    <input type="email" name="email" class="form-control"
                           placeholder="votre@email.com" required>
                </div>
                <div class="col-md-6">
                    <label class="form-label">
                        <i class="fas fa-city me-1 text-success"></i>Ville
                    </label>
                    <input type="text" name="ville" class="form-control"
                           placeholder="Ex: Yaoundé" required>
                </div>
                <div class="col-md-6">
                    <label class="form-label">
                        <i class="fas fa-map-marker-alt me-1 text-success"></i>Quartier
                    </label>
                    <input type="text" name="quartier" class="form-control"
                           placeholder="Ex: Bastos" required>
                </div>
                <div class="col-md-6">
                    <label class="form-label">
                        <i class="fas fa-lock me-1 text-success"></i>Mot de passe
                    </label>
                    <input type="password" name="password1" class="form-control"
                           placeholder="Mot de passe" required>
                </div>
                <div class="col-md-6">
                    <label class="form-label">
                        <i class="fas fa-lock me-1 text-success"></i>Confirmation
                    </label>
                    <input type="password" name="password2" class="form-control"
                           placeholder="Confirmez le mot de passe" required>
                </div>
            </div>

            <button type="submit" class="btn btn-primary w-100 py-3 mt-4">
                <i class="fas fa-user-plus me-2"></i>Créer mon compte
            </button>
        </form>

        <div class="divider"><span>Déjà un compte ?</span></div>

        <a href="{% url 'login' %}" class="btn btn-outline-success w-100">
            <i class="fas fa-sign-in-alt me-2"></i>Se connecter
        </a>

    </div>
</div>
<script>
function selectRole(role) {
    document.getElementById('roleInput').value = role;
    document.getElementById('role-citoyen').classList.remove('active');
    document.getElementById('role-agent').classList.remove('active');
    document.getElementById('role-' + role).classList.add('active');
}
</script>
</body>
</html>

{% load static %}
<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Connexion — CleanCity</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css" rel="stylesheet">
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="{% static 'css/main.css' %}">
</head>
<body>
<div class="auth-wrapper">
    <div class="auth-card">

        <div class="auth-logo">
            <i class="fas fa-recycle text-success me-2"></i>
            Clean<span style="color:#f7c948">City</span>
        </div>
        <p class="auth-subtitle">Connectez-vous à votre compte</p>

        {% if messages %}
            {% for message in messages %}
            <div class="alert alert-danger py-2 text-center" style="font-size:0.88rem;">
                {{ message }}
            </div>
            {% endfor %}
        {% endif %}

        <form method="POST">
            {% csrf_token %}
            <div class="mb-3">
                <label class="form-label">
                    <i class="fas fa-user me-1 text-success"></i>Nom d'utilisateur
                </label>
                <input type="text" name="username" class="form-control"
                       placeholder="Votre nom d'utilisateur" required>
            </div>
            <div class="mb-4">
                <label class="form-label">
                    <i class="fas fa-lock me-1 text-success"></i>Mot de passe
                </label>
                <div class="position-relative">
                    <input type="password" name="password" class="form-control"
                           placeholder="Votre mot de passe" id="passwordInput" required>
                    <span class="position-absolute top-50 end-0 translate-middle-y pe-3"
                          style="cursor:pointer;" onclick="togglePassword()">
                        <i class="fas fa-eye text-muted" id="eyeIcon"></i>
                    </span>
                </div>
            </div>
            <button type="submit" class="btn btn-primary w-100 py-3">
                <i class="fas fa-sign-in-alt me-2"></i>Se connecter
            </button>
        </form>

        <div class="divider"><span>Pas encore de compte ?</span></div>

        <a href="{% url 'register' %}" class="btn btn-outline-success w-100">
            <i class="fas fa-user-plus me-2"></i>Créer un compte
        </a>

    </div>
</div>
<script>
function togglePassword() {
    const input = document.getElementById('passwordInput');
    const icon = document.getElementById('eyeIcon');
    if (input.type === 'password') {
        input.type = 'text';
        icon.classList.replace('fa-eye', 'fa-eye-slash');
    } else {
        input.type = 'password';
        icon.classList.replace('fa-eye-slash', 'fa-eye');
    }
}
</script>
</body>
</html>
